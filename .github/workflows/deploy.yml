name: Build and Push to Artifact Registry

on:
  push:
    branches:
      - main  # Triggers only when pushing to main

env:
  GAR_LOCATION: europe-west4-docker.pkg.dev
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
  REPOSITORY: entsoe

jobs:
  detect_changes:
    runs-on: ubuntu-latest
    outputs:
      ingest: ${{ steps.filter.outputs.ingest }}
      dbt: ${{ steps.filter.outputs.dbt }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ingest:
              - 'Dockerfile'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'src/**'
              - 'ScriptForSpark/**'
              - 'kestra/**'
            dbt:
              - 'Dockerfile.dbt'
              - 'dbt/**'

  build_ingest:
    needs: detect_changes
    if: ${{ needs.detect_changes.outputs.ingest == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Configure Docker
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}

      - name: Build ingest image
        run: |
          docker build -f Dockerfile -t ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/ingest:latest .

      - name: Push ingest image
        run: |
          docker push ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/ingest:latest

      - name: Upload Spark scripts to GCS
        run: |
          gcloud storage rsync --recursive ScriptForSpark gs://${{ env.GCS_BUCKET }}/scripts

  build_dbt:
    needs: detect_changes
    if: ${{ needs.detect_changes.outputs.dbt == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Configure Docker
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}

      - name: Build dbt image
        run: |
          docker build -f Dockerfile.dbt -t ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/dbt:latest .

      - name: Push dbt image
        run: |
          docker push ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/dbt:latest