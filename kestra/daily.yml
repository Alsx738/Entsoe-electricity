id: entsoe-daily-ingestion
namespace: data_engineering.entsoe

description: |
  Daily pipeline: Ingestione XML via Docker e processing Spark su cluster fisico (cluster-cdca).

variables:
  target_country: "ALL"
  gcp_project_id: "entsoe-electricity-v2"
  bucket_name: "entsoe-data-lake-test5689"
  region: "europe-west4"
  cluster_name: "cluster-cdca"

inputs:
  - id: custom_date
    type: DATE
    description: "Data opzionale (yyyy-MM-dd). Se vuota, usa la data del trigger."
    required: false

triggers:
  - id: daily_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 3 * * *"
    timezone: "Europe/Rome"

tasks:
  - id: ingest_entsoe_data
    type: io.kestra.plugin.docker.Run
    containerImage: "europe-west4-docker.pkg.dev/{{ vars.gcp_project_id }}/entsoe/ingest:latest"
    pullPolicy: ALWAYS
    credentials:
      registry: "europe-west4-docker.pkg.dev"
      username: "_json_key"
      password: "{{ secret('GCP_CREDS_JSON') }}"
    commands:
      - "/app/src/daily_ingestion.py"
      - "--country"
      - "{{ vars.target_country }}"
      - "--start"
      - "{{ (inputs.custom_date ?? trigger.date | date('yyyy-MM-dd')) | dateAdd(-1, 'DAYS') | date('yyyy-MM-dd') }}"
      - "--end"
      - "{{ (inputs.custom_date ?? trigger.date | date('yyyy-MM-dd')) | dateAdd(-1, 'DAYS') | date('yyyy-MM-dd') }}"
    env:
      ENTSOE_TOKEN: "{{ secret('ENTSOE_TOKEN') }}"
      GCS_BUCKET_NAME: "{{ vars.bucket_name }}"
      GCP_SA_CREDENTIALS_JSON: "{{ secret('GCP_CREDS_JSON') }}"
      MAX_WORKERS: "3"

  - id: ingest_daily_prices
    type: io.kestra.plugin.docker.Run
    containerImage: "europe-west4-docker.pkg.dev/{{ vars.gcp_project_id }}/entsoe/ingest:latest"
    pullPolicy: ALWAYS
    credentials:
      registry: "europe-west4-docker.pkg.dev"
      username: "_json_key"
      password: "{{ secret('GCP_CREDS_JSON') }}"
    commands:
      - "/app/src/dailyPrice.py"
      - "--country"
      - "{{ vars.target_country }}"
      - "--date"
      - "{{ (inputs.custom_date ?? trigger.date | date('yyyy-MM-dd')) | dateAdd(-1, 'DAYS') | date('yyyy-MM-dd') }}"
    env:
      ENTSOE_TOKEN: "{{ secret('ENTSOE_TOKEN') }}"
      GCS_BUCKET_NAME: "{{ vars.bucket_name }}"
      GCP_SA_CREDENTIALS_JSON: "{{ secret('GCP_CREDS_JSON') }}"
      MAX_WORKERS: "5"

  - id: start_dataproc
    type: io.kestra.plugin.gcp.cli.GCloudCLI
    projectId: "{{ vars.gcp_project_id }}"
    serviceAccount: "{{ secret('GCP_CREDS_JSON') }}"
    commands:
      - "gcloud dataproc clusters start {{ vars.cluster_name }} --region={{ vars.region }}"


  - id: process_daily_with_spark
    type: io.kestra.plugin.gcp.cli.GCloudCLI
    projectId: "{{ vars.gcp_project_id }}"
    serviceAccount: "{{ secret('GCP_CREDS_JSON') }}"
    commands:
      - >
        gcloud dataproc jobs submit pyspark 
        gs://{{ vars.bucket_name }}/scripts/entsoe_master_daily.py
        --cluster={{ vars.cluster_name }}
        --region={{ vars.region }}
        --properties="spark.jars.packages=com.databricks:spark-xml_2.12:0.18.0,spark.driver.memory=10g,spark.executor.memory=2g,spark.memory.fraction=0.6,spark.sql.shuffle.partitions=12"
        -- 
        "gs://{{ vars.bucket_name }}"
        "{{ (inputs.custom_date ?? trigger.date | date('yyyy-MM-dd')) | dateAdd(-1, 'DAYS') | date('yyyy-MM-dd') }}"
        "{{ (inputs.custom_date ?? trigger.date | date('yyyy-MM-dd')) | dateAdd(-1, 'DAYS') | date('yyyy-MM-dd') }}"


  - id: stop_dataproc
    type: io.kestra.plugin.gcp.cli.GCloudCLI
    projectId: "{{ vars.gcp_project_id }}"
    serviceAccount: "{{ secret('GCP_CREDS_JSON') }}"
    commands:
      - "gcloud dataproc clusters stop {{ vars.cluster_name }} --region={{ vars.region }}"

errors:
  - id: stop_cluster_on_error
    type: io.kestra.plugin.gcp.cli.GCloudCLI
    projectId: "{{ vars.gcp_project_id }}"
    serviceAccount: "{{ secret('GCP_CREDS_JSON') }}"
    commands:
      - "gcloud dataproc clusters stop {{ vars.cluster_name }} --region={{ vars.region }}"
  - id: notify_on_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "ENTSO-E daily pipeline failed. Flow={{ flow.id }}, Execution={{ execution.id }}"
      }