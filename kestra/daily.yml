id: entsoe-daily-ingestion
namespace: data_engineering.entsoe

description: |
  Daily pipeline that downloads ENTSO-E data (Load, Generation, Physical Flows)
  for the previous day and uploads raw XML files to Google Cloud Storage.
  Supports both scheduled and manual executions.

# ==========================================
# VARIABLES (Namespace-level defaults)
# ==========================================
variables:
  target_country: "ALL"
  gcp_project_id: "entsoe-electricity"
  bucket_name: "entsoe-data-lake-test"

# ==========================================
# INPUTS
# ==========================================
inputs:
  - id: custom_date
    type: DATE
    description: "Optional: set a specific date for a manual run (e.g. 2026-03-10). If empty, use the trigger date."
    required: false

# ==========================================
# TRIGGER: Run every night at 03:00
# ==========================================
triggers:
  - id: daily_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 3 * * *"
    timezone: "Europe/Rome"

# ==========================================
# TASKS
# ==========================================
tasks:
  - id: ingest_entsoe_data
    type: io.kestra.plugin.docker.Run
    containerImage: "europe-west1-docker.pkg.dev/{{ vars.gcp_project_id }}/entsoe/ingest:latest"

    # Credentials for the private GCP registry
    credentials:
      registry: "europe-west1-docker.pkg.dev"
      username: "_json_key"
      password: "{{ secret('GCP_CREDS_JSON') }}"

    # CLI arguments forwarded to ENTRYPOINT ["python"]
    # If custom_date is provided, it overrides the trigger date
    commands:
      - "/app/src/daily_ingestion.py"
      - "--country"
      - "{{ vars.target_country }}"
      - "--date"
      - "{{ inputs.custom_date ?? trigger.date | date('yyyy-MM-dd') }}"

    # Environment variables passed to the container
    env:
      ENTSOE_TOKEN: "{{ secret('ENTSOE_TOKEN') }}"
      GCS_BUCKET_NAME: "{{ vars.bucket_name }}"
      GCP_SA_CREDENTIALS_JSON: "{{ secret('GCP_CREDS_JSON') }}"
      MAX_WORKERS: "5"

# ==========================================
# ERROR HANDLING: Slack notification
# ==========================================
errors:
  - id: notify_on_failure
    type: io.kestra.plugin.notifications.slack.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": " *ENTSO-E Daily Ingestion Failed*\n*Flow:* {{ flow.id }}\n*Execution:* {{ execution.id }}\n*Date:* {{ trigger.date | date('yyyy-MM-dd') }}\n*Check logs here:* {{ flow.url }}"
      }