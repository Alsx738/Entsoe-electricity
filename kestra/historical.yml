id: entsoe-historical-bootstrap
namespace: data_engineering.entsoe

description: Backfill pipeline for yearly historical ENTSO-E XML data using physical cluster.

variables:
  gcp_project_id: "entsoe-electricity-v2"
  bucket_name: "entsoe-data-lake-test5689"
  region: "europe-west4"
  cluster_name: "cluster-cdca"

inputs:
  - id: start_date
    type: DATE
    description: "Start of the backfill period (e.g. 2023-01-01)"
  - id: end_date
    type: DATE
    description: "End of the backfill period (e.g. 2025-12-31)"
  - id: country
    type: STRING
    defaults: "ALL"

tasks:
  - id: ingest_historical_data
    type: io.kestra.plugin.docker.Run
    containerImage: "europe-west4-docker.pkg.dev/{{ vars.gcp_project_id }}/entsoe/ingest:latest"
    pullPolicy: ALWAYS
    credentials:
      registry: "europe-west4-docker.pkg.dev"
      username: "_json_key"
      password: "{{ secret('GCP_CREDS_JSON') }}"
    commands:
      - "/app/src/historical_ingestion.py"
      - "--start"
      - "{{ inputs.start_date }}"
      - "--end"
      - "{{ inputs.end_date }}"
      - "--country"
      - "{{ inputs.country }}"
    env:
      ENTSOE_TOKEN: "{{ secret('ENTSOE_TOKEN') }}"
      GCS_BUCKET_NAME: "{{ vars.bucket_name }}"
      GCP_SA_CREDENTIALS_JSON: "{{ secret('GCP_CREDS_JSON') }}"
      MAX_WORKERS: "3"

  - id: ingest_historical_prices
    type: io.kestra.plugin.docker.Run
    containerImage: "europe-west4-docker.pkg.dev/{{ vars.gcp_project_id }}/entsoe/ingest:latest"
    pullPolicy: ALWAYS
    credentials:
      registry: "europe-west4-docker.pkg.dev"
      username: "_json_key"
      password: "{{ secret('GCP_CREDS_JSON') }}"
    commands:
      - "/app/src/HistoricalPrice.py"
      - "--start"
      - "{{ inputs.start_date }}"
      - "--end"
      - "{{ inputs.end_date }}"
      - "--country"
      - "{{ inputs.country }}"
    env:
      ENTSOE_TOKEN: "{{ secret('ENTSOE_TOKEN') }}"
      GCS_BUCKET_NAME: "{{ vars.bucket_name }}"
      GCP_SA_CREDENTIALS_JSON: "{{ secret('GCP_CREDS_JSON') }}"
      MAX_WORKERS: "5"

  - id: start_cluster
    type: io.kestra.plugin.gcp.cli.GCloudCLI
    projectId: "{{ vars.gcp_project_id }}"
    serviceAccount: "{{ secret('GCP_CREDS_JSON') }}"
    commands:
      - "gcloud dataproc clusters start {{ vars.cluster_name }} --region={{ vars.region }}"
      
  - id: process_historical_spark
    type: io.kestra.plugin.gcp.cli.GCloudCLI
    projectId: "{{ vars.gcp_project_id }}"
    serviceAccount: "{{ secret('GCP_CREDS_JSON') }}"
    commands:
      - >
        gcloud dataproc jobs submit pyspark 
        gs://{{ vars.bucket_name }}/scripts/entsoe_master_historical.py
        --cluster={{ vars.cluster_name }}
        --region={{ vars.region }}
        --properties="spark.jars.packages=com.databricks:spark-xml_2.12:0.18.0,spark.driver.memory=10g,spark.executor.memory=2g,spark.memory.fraction=0.6,spark.sql.shuffle.partitions=20"
        -- 
        "gs://{{ vars.bucket_name }}"
        "{{ inputs.start_date }}"
        "{{ inputs.end_date }}"

  - id: stop_cluster
    type: io.kestra.plugin.gcp.cli.GCloudCLI
    projectId: "{{ vars.gcp_project_id }}"
    serviceAccount: "{{ secret('GCP_CREDS_JSON') }}"
    commands:
      - "gcloud dataproc clusters stop {{ vars.cluster_name }} --region={{ vars.region }}"

errors:
  - id: stop_cluster_on_error
    type: io.kestra.plugin.gcp.cli.GCloudCLI
    projectId: "{{ vars.gcp_project_id }}"
    serviceAccount: "{{ secret('GCP_CREDS_JSON') }}"
    commands:
      - "gcloud dataproc clusters stop {{ vars.cluster_name }} --region={{ vars.region }}"
  - id: send_slack_alert
    type: io.kestra.plugin.notifications.slack.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "ENTSO-E Historical backfill failed for period {{ inputs.start_date }} to {{ inputs.end_date }}."
      }