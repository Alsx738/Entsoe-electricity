id: entsoe-installed-capacity
namespace: data_engineering.entsoe

description: |
  Semi-annual and on-demand pipeline for ENTSO-E Installed Generation Capacity (A68/A33).

variables:
  target_country: "ALL"
  gcp_project_id: "entsoe-electricity-v2"
  bucket_name: "entsoe-data-lake-test5689"
  region: "europe-west4"

inputs:
  - id: start_date
    type: DATE
    required: false
    description: "Optional start date. If empty, current year start is used."
  - id: end_date
    type: DATE
    required: false
    description: "Optional end date. If empty, current year end is used."
  - id: country
    type: STRING
    required: true
    defaults: "ALL"

triggers:
  - id: semi_annual_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 4 1 1,7 *"
    timezone: "Europe/Rome"

tasks:
  - id: ingest_installed_capacity
    type: io.kestra.plugin.docker.Run
    containerImage: "europe-west4-docker.pkg.dev/{{ vars.gcp_project_id }}/entsoe/ingest:latest"
    pullPolicy: ALWAYS
    credentials:
      registry: "europe-west4-docker.pkg.dev"
      username: "_json_key"
      password: "{{ secret('GCP_CREDS_JSON') }}"

    commands:
      - "/app/src/installed_capacity_ingestion.py"
      - "--country"
      - "{{ inputs.country ?? vars.target_country }}"
      - "--start"
      - "{{ inputs.start_date ?? (trigger.date | date('yyyy-01-01')) }}"
      - "--end"
      - "{{ inputs.end_date ?? (trigger.date | date('yyyy-12-31')) }}"

    env:
      ENTSOE_TOKEN: "{{ secret('ENTSOE_TOKEN') }}"
      GCS_BUCKET_NAME: "{{ vars.bucket_name }}"
      GCP_SA_CREDENTIALS_JSON: "{{ secret('GCP_CREDS_JSON') }}"
      MAX_WORKERS: "5"

  - id: process_installed_capacity_with_spark
    type: io.kestra.plugin.gcp.dataproc.batches.PySparkSubmit
    timeout: PT45M
    name: "entsoe-installed-capacity-transform"
    serviceAccount: "{{ secret('GCP_CREDS_JSON') }}"
    projectId: "{{ vars.gcp_project_id }}"
    region: "{{ vars.region }}"
    execution:
      subnetworkUri: "projects/{{ vars.gcp_project_id }}/regions/{{ vars.region }}/subnetworks/entsoe-spark-subnet"
    mainPythonFileUri: "gs://{{ vars.bucket_name }}/scripts/entsoe_installed_capacity.py"
    args:
      - "gs://{{ vars.bucket_name }}"
      - "{{ inputs.start_date ?? (trigger.date | date('yyyy-01-01')) }}"
      - "{{ inputs.end_date ?? (trigger.date | date('yyyy-12-31')) }}"
    runtime:
      version: "2.1"
      properties:
        "spark.jars.packages": "com.databricks:spark-xml_2.13:0.18.0"
        "spark.driver.cores": "4"
        "spark.executor.cores": "4"
        "spark.driver.memory": "3g"
        "spark.executor.memory": "3g"
        "spark.executor.instances": "2"
        "spark.dataproc.driver.disk.size.gb": "100"
        "spark.dataproc.executor.disk.size.gb": "100"

errors:
  - id: notify_on_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "ENTSO-E installed capacity pipeline failed. Flow={{ flow.id }}, Execution={{ execution.id }}"
      }
