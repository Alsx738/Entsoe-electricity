id: entsoe-installed-capacity
namespace: data_engineering.entsoe

description: |
  Pipeline semestrale per la Capacità Generativa Installata.
  Ingestione Docker e processing Spark su cluster fisico (cluster-cdca).

variables:
  target_country: "ALL"
  gcp_project_id: "entsoe-electricity-v2"
  bucket_name: "entsoe-data-lake-test5689"
  region: "europe-west4"
  cluster_name: "cluster-cdca"

inputs:
  - id: start_date
    type: DATE
    required: false
    description: "Data inizio opzionale. Default: 1° Gennaio anno corrente."
  - id: end_date
    type: DATE
    required: false
    description: "Data fine opzionale. Default: 31 Dicembre anno corrente."
  - id: country
    type: STRING
    required: true
    defaults: "ALL"

triggers:
  - id: semi_annual_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 4 1 1,7 *"
    timezone: "Europe/Rome"

tasks:
  # --- STEP 1: INGESTIONE (DOCKER) ---
  - id: ingest_installed_capacity
    type: io.kestra.plugin.docker.Run
    containerImage: "europe-west4-docker.pkg.dev/{{ vars.gcp_project_id }}/entsoe/ingest:latest"
    pullPolicy: ALWAYS
    credentials:
      registry: "europe-west4-docker.pkg.dev"
      username: "_json_key"
      password: "{{ secret('GCP_CREDS_JSON') }}"
    commands:
      - "/app/src/installed_capacity_ingestion.py"
      - "--country"
      - "{{ inputs.country }}"
      - "--start"
      - "{{ inputs.start_date ?? now() | date('yyyy-01-01') }}"
      - "--end"
      - "{{ inputs.end_date ?? now() | date('yyyy-12-31') }}"
    env:
      ENTSOE_TOKEN: "{{ secret('ENTSOE_TOKEN') }}"
      GCS_BUCKET_NAME: "{{ vars.bucket_name }}"
      GCP_SA_CREDENTIALS_JSON: "{{ secret('GCP_CREDS_JSON') }}"
      MAX_WORKERS: "5"

  # --- STEP 2: ACCENSIONE CLUSTER ---
  - id: start_dataproc
    type: io.kestra.plugin.gcp.cli.GCloudCLI
    projectId: "{{ vars.gcp_project_id }}"
    serviceAccount: "{{ secret('GCP_CREDS_JSON') }}"
    commands:
      - "gcloud dataproc clusters start {{ vars.cluster_name }} --region={{ vars.region }}"

  # --- STEP 3: ELABORAZIONE SPARK ---
  - id: process_installed_capacity_with_spark
    type: io.kestra.plugin.gcp.cli.GCloudCLI
    projectId: "{{ vars.gcp_project_id }}"
    serviceAccount: "{{ secret('GCP_CREDS_JSON') }}"
    commands:
      - >
        gcloud dataproc jobs submit pyspark 
        gs://{{ vars.bucket_name }}/scripts/entsoe_installed_capacity.py
        --cluster={{ vars.cluster_name }}
        --region={{ vars.region }}
        --properties="spark.jars.packages=com.databricks:spark-xml_2.12:0.18.0,spark.driver.memory=10g,spark.executor.memory=2g,spark.memory.fraction=0.6"
        -- 
        "gs://{{ vars.bucket_name }}"
        "{{ inputs.start_date ?? now() | date('yyyy-01-01') }}"
        "{{ inputs.end_date ?? now() | date('yyyy-12-31') }}"

  # --- STEP 4: SPEGNIMENTO CLUSTER ---
  - id: stop_dataproc
    type: io.kestra.plugin.gcp.cli.GCloudCLI
    projectId: "{{ vars.gcp_project_id }}"
    serviceAccount: "{{ secret('GCP_CREDS_JSON') }}"
    commands:
      - "gcloud dataproc clusters stop {{ vars.cluster_name }} --region={{ vars.region }}"

errors:
  - id: stop_cluster_on_error
    type: io.kestra.plugin.gcp.cli.GCloudCLI
    projectId: "{{ vars.gcp_project_id }}"
    serviceAccount: "{{ secret('GCP_CREDS_JSON') }}"
    commands:
      - "gcloud dataproc clusters stop {{ vars.cluster_name }} --region={{ vars.region }}"
  - id: notify_on_failure
    type: io.kestra.plugin.slack.notifications.SlackIncomingWebhook
    url: "{{ secret('SLACK_WEBHOOK_URL') }}"
    payload: |
      {
        "text": "Installed Capacity fallita per {{ inputs.country }}. Periodo: {{ inputs.start_date ?? 'Inizio Anno' }} - {{ inputs.end_date ?? 'Fine Anno' }}"
      }